name: Tourism Wellness MLOps Pipeline

on:
  push:
    branches: [main]

jobs:

  # ── Job 1: Data Registration ─────────────────────────────────
  data-registration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Register data
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python pipeline/data_registration.py

  # ── Job 2: Data Preparation ───────────────────────────────────
  data-preparation:
    runs-on: ubuntu-latest
    needs: data-registration
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Prepare data
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python pipeline/data_preparation.py

  # ── Job 3: Model Training ─────────────────────────────────────
  model-training:
    runs-on: ubuntu-latest
    needs: data-preparation
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Train model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python pipeline/model_training.py

  # ── Job 4: Deployment ─────────────────────────────────────────
  deployment:
    runs-on: ubuntu-latest
    needs: model-training
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Deploy to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python deployment/hosting.py
        
