name: Tourism Project Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

jobs:
  register-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r tourism_project/requirements_ci.txt
      - name: Register Dataset
        run: python tourism_project/model_building/data_registration.py

  data-prep:
    runs-on: ubuntu-latest
    needs: register-dataset
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r tourism_project/requirements_ci.txt
      - name: Data Preparation
        run: python tourism_project/model_building/data_preparation.py

  model-training:
    runs-on: ubuntu-latest
    needs: data-prep
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r tourism_project/requirements_ci.txt
      - name: Start MLflow server
        run: |
          mlflow server --host 0.0.0.0 --port 5000 &
          sleep 5
      - name: Train Model
        env:
          MLFLOW_TRACKING_URI: http://localhost:5000
        run: python tourism_project/model_building/model_building.py

  deploy-hosting:
    runs-on: ubuntu-latest
    needs: model-training
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r tourism_project/deployment/requirements.txt
      - name: Validate deployment script
        run: python -c "import importlib.util; spec = importlib.util.spec_from_file_location('hosting', 'tourism_project/deployment/hosting.py'); print('Deploy script OK')"
